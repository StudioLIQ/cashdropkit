services:
  postgres:
    image: postgres:16-alpine
    container_name: cashdropkit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cashdropkit
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cashdropkit']
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - cashdropkit_pgdata:/var/lib/postgresql/data

volumes:
  cashdropkit_pgdata:
